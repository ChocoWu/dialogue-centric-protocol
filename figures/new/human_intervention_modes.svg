<svg viewBox="0 0 1240 560" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6B7280"/>
    </marker>
  </defs>

  <text x="40" y="38" font-size="20" font-weight="bold" fill="#111827">Human Intervention — Four Modes</text>
  <text x="40" y="58" font-size="13" fill="#6B7280">reconciled with response_requirement (§1.4) and role-level human_policy (§2.8) · async inputs are queued in pending_inputs[]</text>

  <!-- ============ Card 1: Optional Enrichment ============ -->
  <rect x="40" y="90" width="272" height="330" rx="12" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="176" y="120" font-size="15" font-weight="bold" fill="#065F46" text-anchor="middle">Optional Enrichment</text>
  <line x1="60" y1="134" x2="292" y2="134" stroke="#A7F3D0" stroke-width="1"/>
  <text x="60" y="158" font-size="11.5" fill="#047857"><tspan font-weight="bold">binding:</tspan> human role with</text>
  <text x="60" y="174" font-size="11.5" fill="#047857">response_requirement: optional</text>
  <text x="60" y="198" font-size="11.5" fill="#047857"><tspan font-weight="bold">waits?</tspan>  No — the dialogue</text>
  <text x="60" y="214" font-size="11.5" fill="#047857">continues without the input</text>
  <text x="60" y="238" font-size="11.5" fill="#047857"><tspan font-weight="bold">input:</tspan> queued to pending_inputs[],</text>
  <text x="60" y="254" font-size="11.5" fill="#047857">admitted by the orchestrator</text>
  <text x="60" y="278" font-size="11.5" fill="#047857"><tspan font-weight="bold">on_timeout:</tspan> continue</text>
  <!-- glyph -->
  <line x1="70" y1="330" x2="282" y2="330" stroke="#059669" stroke-width="2" marker-end="url(#a4)"/>
  <circle cx="150" cy="330" r="6" fill="#FFFFFF" stroke="#059669" stroke-width="2"/>
  <text x="150" y="316" font-size="10" fill="#047857" text-anchor="middle">human may add</text>
  <text x="176" y="356" font-size="10.5" font-style="italic" fill="#065F46" text-anchor="middle">dialogue never blocks</text>
  <text x="60" y="392" font-size="10.5" font-style="italic" fill="#059669">useful when feedback helps</text>
  <text x="60" y="407" font-size="10.5" font-style="italic" fill="#059669">but is not required</text>

  <!-- ============ Card 2: Required Input ============ -->
  <rect x="342" y="90" width="272" height="330" rx="12" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="478" y="120" font-size="15" font-weight="bold" fill="#1D4ED8" text-anchor="middle">Required Input</text>
  <line x1="362" y1="134" x2="594" y2="134" stroke="#BFDBFE" stroke-width="1"/>
  <text x="362" y="158" font-size="11.5" fill="#1E40AF"><tspan font-weight="bold">binding:</tspan> human role with</text>
  <text x="362" y="174" font-size="11.5" fill="#1E40AF">response_requirement: required</text>
  <text x="362" y="198" font-size="11.5" fill="#1E40AF"><tspan font-weight="bold">waits?</tspan>  Yes — status: awaiting,</text>
  <text x="362" y="214" font-size="11.5" fill="#1E40AF">within wait_window_seconds</text>
  <text x="362" y="238" font-size="11.5" fill="#1E40AF"><tspan font-weight="bold">MUST have a timeout</tspan> — a required</text>
  <text x="362" y="254" font-size="11.5" fill="#1E40AF">human cannot hang the instance</text>
  <text x="362" y="278" font-size="11.5" fill="#1E40AF"><tspan font-weight="bold">on_timeout:</tspan> continue |</text>
  <text x="362" y="294" font-size="11.5" fill="#1E40AF">finalize_provisional</text>
  <!-- glyph -->
  <line x1="372" y1="330" x2="452" y2="330" stroke="#2563EB" stroke-width="2"/>
  <rect x="452" y="318" width="80" height="24" rx="12" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="492" y="334" font-size="9.5" fill="#1D4ED8" text-anchor="middle">wait window</text>
  <line x1="532" y1="330" x2="584" y2="330" stroke="#2563EB" stroke-width="2" marker-end="url(#a4)"/>
  <text x="478" y="356" font-size="10.5" font-style="italic" fill="#1D4ED8" text-anchor="middle">blocks, but bounded</text>
  <text x="362" y="392" font-size="10.5" font-style="italic" fill="#2563EB">a mandated human seat, e.g. the</text>
  <text x="362" y="407" font-size="10.5" font-style="italic" fill="#2563EB">founder must state a position</text>

  <!-- ============ Card 3: Approval Gate ============ -->
  <rect x="644" y="90" width="272" height="330" rx="12" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="780" y="120" font-size="15" font-weight="bold" fill="#B45309" text-anchor="middle">Approval Gate</text>
  <line x1="664" y1="134" x2="896" y2="134" stroke="#FDE68A" stroke-width="1"/>
  <text x="664" y="158" font-size="11.5" fill="#78350F"><tspan font-weight="bold">binding:</tspan> human role with</text>
  <text x="664" y="174" font-size="11.5" fill="#78350F">response_requirement: gate</text>
  <text x="664" y="198" font-size="11.5" fill="#78350F"><tspan font-weight="bold">waits?</tspan>  Yes — gate_opened,</text>
  <text x="664" y="214" font-size="11.5" fill="#78350F">status: awaiting</text>
  <text x="664" y="238" font-size="11.5" fill="#78350F"><tspan font-weight="bold">decision:</tspan> approve | reject | revise</text>
  <text x="664" y="254" font-size="11.5" fill="#78350F">(= required + decision semantics)</text>
  <text x="664" y="278" font-size="11.5" fill="#78350F"><tspan font-weight="bold">on_timeout:</tspan> finalize_provisional</text>
  <text x="664" y="294" font-size="11.5" fill="#78350F">⇒ terminal status: provisional</text>
  <!-- glyph -->
  <line x1="674" y1="330" x2="760" y2="330" stroke="#D97706" stroke-width="2"/>
  <rect x="760" y="314" width="16" height="32" rx="3" fill="#D97706"/>
  <text x="768" y="308" font-size="10" fill="#B45309" text-anchor="middle">gate</text>
  <line x1="776" y1="330" x2="886" y2="330" stroke="#D97706" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a4)"/>
  <text x="780" y="356" font-size="10.5" font-style="italic" fill="#B45309" text-anchor="middle">blocked until decision / timeout</text>
  <text x="664" y="392" font-size="10.5" font-style="italic" fill="#D97706">gate_resolved {gate_id, decision}</text>
  <text x="664" y="407" font-size="10.5" font-style="italic" fill="#D97706">closes the gate</text>

  <!-- ============ Card 4: Open Mic ============ -->
  <rect x="946" y="90" width="272" height="330" rx="12" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="1082" y="120" font-size="15" font-weight="bold" fill="#5B21B6" text-anchor="middle">Open Mic</text>
  <line x1="966" y1="134" x2="1198" y2="134" stroke="#DDD6FE" stroke-width="1"/>
  <text x="966" y="158" font-size="11.5" fill="#6D28D9"><tspan font-weight="bold">binding:</tspan> observe-tier participant</text>
  <text x="966" y="174" font-size="11.5" fill="#6D28D9">〔D5〕 — no seat / no role needed</text>
  <text x="966" y="198" font-size="11.5" fill="#6D28D9"><tspan font-weight="bold">precondition:</tspan> template must</text>
  <text x="966" y="214" font-size="11.5" fill="#6D28D9">enable open mic, else rejected</text>
  <text x="966" y="238" font-size="11.5" fill="#6D28D9"><tspan font-weight="bold">not a turn:</tspan> queued as pending</text>
  <text x="966" y="254" font-size="11.5" fill="#6D28D9">(human_input_pending)</text>
  <text x="966" y="278" font-size="11.5" fill="#6D28D9"><tspan font-weight="bold">resolved:</tspan> human_input_addressed</text>
  <text x="966" y="294" font-size="11.5" fill="#6D28D9">{input_id, addressed_by}</text>
  <!-- glyph -->
  <line x1="976" y1="330" x2="1188" y2="330" stroke="#7C3AED" stroke-width="2" marker-end="url(#a4)"/>
  <circle cx="1040" cy="330" r="6" fill="#7C3AED"/>
  <text x="1040" y="316" font-size="10" fill="#6D28D9" text-anchor="middle">interjection</text>
  <circle cx="1130" cy="330" r="6" fill="#FFFFFF" stroke="#7C3AED" stroke-width="2"/>
  <text x="1130" y="316" font-size="10" fill="#6D28D9" text-anchor="middle">addressed</text>
  <text x="1082" y="356" font-size="10.5" font-style="italic" fill="#5B21B6" text-anchor="middle">pending until explicitly addressed</text>
  <text x="966" y="392" font-size="10.5" font-style="italic" fill="#7C3AED">e.g. an observer asks “how does</text>
  <text x="966" y="407" font-size="10.5" font-style="italic" fill="#7C3AED">this differ from X?”</text>

  <!-- footer -->
  <rect x="40" y="448" width="1178" height="76" rx="10" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.2"/>
  <text x="60" y="474" font-size="12" font-weight="bold" fill="#111827">human_policy — role level (template may set human_policy_defaults, inherited by roles that omit it)</text>
  <text x="60" y="496" font-size="11.5" fill="#374151">Applies to any human role the orchestrator waits on (required and gate):  {wait_window_seconds, on_timeout: continue | finalize_provisional}.</text>
  <text x="60" y="514" font-size="11.5" fill="#374151">Optional humans are never waited on;  open mic is tier-based (D5), not role-based.  A gate timeout that blocks the goal yields a provisional termination (§2.10).</text>
</svg>
